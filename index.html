<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Cronômetro Pro</title>
</head>

<body>

    <div id="stopwatch">
        <div id="timer">00:00:00:00</div>

        <div id="actions">
            <button id="reset" title="Reiniciar Tudo">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
            <button id="power" action="start" title="Iniciar/Pausar">
                <i class="fa-solid fa-play"></i>
            </button>
            <button id="mark" title="Marcar Tempo">
                <i class="fa-solid fa-flag"></i>
            </button>
            <button id="clear-marks" title="Limpar Histórico">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>

        <div id="marks-list"></div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
